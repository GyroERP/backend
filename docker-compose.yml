services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: gyroerp
      POSTGRES_USER: gyroerp
      POSTGRES_PASSWORD: gyroerp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gyroerp -d gyroerp"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: gyroerp.settings.development
      DATABASE_URL: postgres://gyroerp:gyroerp@db:5432/gyroerp
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
